// ===== SEARCH =====
const searchInput = document.getElementById('search-input');
const searchSuggestions = document.getElementById('search-suggestions');

function findCity(query) {
  if (cityData[query]) return query;
  for (const c of allCityNames) { if (c === query) return c; }
  for (const c of allCityNames) { if (c.includes(query) || query.includes(c)) return c; }
  return null;
}

searchInput.addEventListener('input', function() {
  const q = this.value.trim();
  if (!q) { searchSuggestions.innerHTML = '<div class="search-hint">支持模糊搜索，输入任意城市名即可匹配</div>'; searchSuggestions.classList.add('show'); return; }
  const matches = allCityNames.filter(c => c.includes(q));
  if (matches.length === 0) {
    searchSuggestions.innerHTML = '<div class="search-hint" style="color:var(--accent);">未找到匹配城市，请尝试其他名称</div>';
  } else {
    searchSuggestions.innerHTML = matches.slice(0, 10).map(c =>
      '<div class="suggestion-item" data-city="' + c + '">' +
      '<span class="city-emoji">' + cityData[c].emoji + '</span>' +
      '<span class="city-name">' + c + '</span>' +
      '<span class="city-tag">' + cityData[c].tag + '</span></div>'
    ).join('');
  }
  searchSuggestions.classList.add('show');
});

searchInput.addEventListener('focus', function() { searchSuggestions.classList.add('show'); });
searchSuggestions.addEventListener('click', function(e) {
  const item = e.target.closest('.suggestion-item');
  if (item) showGuide(item.dataset.city);
});
document.addEventListener('click', function(e) { if (!e.target.closest('.search-box')) searchSuggestions.classList.remove('show'); });
searchInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const q = this.value.trim();
    if (!q) return;
    const match = findCity(q);
    if (match) showGuide(match);
    else showNotFound(q);
  }
});

// ===== POPULAR GRID =====
const popularGrid = document.getElementById('popular-grid');
popularCities.forEach(city => {
  const info = cityThumbs[city];
  const card = document.createElement('div');
  card.className = 'city-card';
  card.innerHTML =
    '<div class="city-card-img" style="background:linear-gradient(135deg,' + info.color + '22,' + info.color + '55);">' +
    '<span>' + cityData[city].emoji + '</span>' +
    '<span class="city-card-badge">' + info.desc + '</span></div>' +
    '<div class="city-card-body"><h3>' + city + '</h3><p>' + info.desc + '</p></div>';
  card.addEventListener('click', () => showGuide(city));
  popularGrid.appendChild(card);
});

// ===== PROVINCE LIST =====
const provinceList = document.getElementById('province-list');
Object.entries(provinceGroups).forEach(([province, cities]) => {
  const section = document.createElement('div');
  section.className = 'province-section';
  const citiesHtml = cities.map(c =>
    '<button class="province-city-btn" data-city="' + c + '">' + c + '</button>'
  ).join('');
  section.innerHTML =
    '<div class="province-header">' +
    '<h3>' + province + '</h3>' +
    '<span class="province-count">' + cities.length + '个城市</span>' +
    '<span class="province-toggle">&#9660;</span>' +
    '</div>' +
    '<div class="province-cities">' + citiesHtml + '</div>';
  provinceList.appendChild(section);
});

provinceList.addEventListener('click', function(e) {
  const btn = e.target.closest('.province-city-btn');
  if (btn) { showGuide(btn.dataset.city); return; }
  const header = e.target.closest('.province-header');
  if (header) {
    header.classList.toggle('collapsed');
    const cities = header.nextElementSibling;
    cities.classList.toggle('hidden');
  }
});

// ===== SHOW GUIDE =====
function showGuide(city) {
  const data = cityData[city];
  if (!data) return;
  searchSuggestions.classList.remove('show');
  searchInput.value = '';

  document.getElementById('home-page').style.display = 'none';
  document.getElementById('guide-page').style.display = 'block';
  window.scrollTo(0, 0);

  const bg = document.getElementById('guide-hero-bg');
  bg.style.background = 'linear-gradient(135deg,' + data.color + '88 0%,' + data.color + '44 50%,' + data.color + '22 100%)';
  document.getElementById('guide-city-name').textContent = city + ' · ' + data.tag;
  document.getElementById('guide-city-subtitle').textContent = data.subtitle;
  switchTab('overview');

  document.getElementById('tab-overview').innerHTML =
    '<a href="#" class="back-home" onclick="goHome(event)">&#8592; 返回首页</a>' +
    '<div class="overview-intro fade-in"><div class="overview-text">' +
    '<h3>关于' + city + '</h3><p>' + data.description + '</p>' +
    '<div class="tag-list">' + data.highlights.map(h => '<span class="tag">' + h + '</span>').join('') + '</div></div>' +
    '<div class="overview-img"><div class="overview-img-inner" style="background:linear-gradient(135deg,' + data.color + '33,' + data.color + '11);">' +
    '<span>' + data.emoji + '</span></div></div></div>' +
    '<div class="quick-info fade-in">' +
    '<div class="quick-info-card"><div class="qi-icon">&#128197;</div><div class="qi-label">最佳季节</div><div class="qi-value">' + data.bestSeason + '</div></div>' +
    '<div class="quick-info-card"><div class="qi-icon">&#128176;</div><div class="qi-label">花费参考</div><div class="qi-value">' + data.avgCost + '</div></div>' +
    '<div class="quick-info-card"><div class="qi-icon">&#128663;</div><div class="qi-label">交通</div><div class="qi-value">' + data.transport + '</div></div>' +
    '<div class="quick-info-card"><div class="qi-icon">&#128197;</div><div class="qi-label">推荐天数</div><div class="qi-value">' + data.stayDays + '</div></div></div>';

  document.getElementById('tab-food').innerHTML =
    '<a href="#" class="back-home" onclick="goHome(event)">&#8592; 返回首页</a>' +
    '<h3 style="margin-bottom:1.5rem;font-size:1.3rem;">' + city + '必吃美食</h3><div class="food-grid">' +
    data.food.map(f => '<div class="food-card"><div class="food-card-emoji">' + f.emoji + '</div><div class="food-card-info"><h4>' + f.name + '</h4><div class="food-restaurant">&#128205; ' + f.restaurant + '</div><div class="food-price">' + f.price + '</div></div></div>').join('') + '</div>';

  document.getElementById('tab-hotel').innerHTML =
    '<a href="#" class="back-home" onclick="goHome(event)">&#8592; 返回首页</a>' +
    '<h3 style="margin-bottom:1.5rem;font-size:1.3rem;">' + city + '住宿推荐</h3>' +
    '<div class="hotel-table-wrap"><table class="hotel-table"><thead><tr><th>住宿区域</th><th>参考价格</th><th>适合人群</th></tr></thead><tbody>' +
    data.hotels.map(h => '<tr><td><strong>' + h.area + '</strong></td><td class="price">' + h.price + '</td><td>' + h.fit + '</td></tr>').join('') +
    '</tbody></table></div>';

  document.getElementById('tab-spots').innerHTML =
    '<a href="#" class="back-home" onclick="goHome(event)">&#8592; 返回首页</a>' +
    '<h3 style="margin-bottom:1.5rem;font-size:1.3rem;">' + city + '热门打卡点</h3><div class="spot-grid">' +
    data.spots.map(s => '<div class="spot-card"><div class="spot-card-header"><h4>' + s.name + '</h4><span class="spot-card-tag">' + s.tag + '</span></div><div class="spot-card-body"><p>' + s.desc + '</p><div class="spot-card-meta"><span>&#9201; ' + s.time + '</span><span>&#11088; ' + s.rating + '</span></div></div></div>').join('') + '</div>';

  document.getElementById('tab-tickets').innerHTML =
    '<a href="#" class="back-home" onclick="goHome(event)">&#8592; 返回首页</a>' +
    '<h3 style="margin-bottom:1.5rem;font-size:1.3rem;">' + city + '景区门票</h3><div class="ticket-grid">' +
    data.tickets.map(t => '<div class="ticket-card"><div class="ticket-card-header"><h4>' + t.name + '</h4>' +
    (t.price === '免费' ? '<span class="free-badge">免费</span>' : '') +
    '</div><div class="ticket-card-body"><div class="ticket-price ' + (t.price === '免费' ? 'free' : '') + '">' +
    (t.price === '免费' ? '免费开放' : t.price) + (t.price !== '免费' ? '<br><small>/人</small>' : '') +
    '</div><div class="ticket-note">' + t.note + '</div></div></div>').join('') + '</div>';
}

function showNotFound(query) {
  document.getElementById('home-page').style.display = 'none';
  document.getElementById('guide-page').style.display = 'block';
  window.scrollTo(0, 0);
  document.getElementById('guide-hero-bg').style.background = 'linear-gradient(135deg,#8A857888,#8A857822)';
  document.getElementById('guide-city-name').textContent = query;
  document.getElementById('guide-city-subtitle').textContent = '暂未收录该城市';
  switchTab('overview');
  document.getElementById('tab-overview').innerHTML =
    '<a href="#" class="back-home" onclick="goHome(event)">&#8592; 返回首页</a>' +
    '<div class="not-found"><div style="font-size:4rem;margin-bottom:1rem;">&#128269;</div>' +
    '<h3>未找到「' + query + '」的攻略</h3>' +
    '<p>目前收录 346 个城市，请尝试其他城市名称</p>' +
    '<div class="not-found-tags">' +
    allCityNames.slice(0, 16).map(c => '<a href="#" onclick="event.preventDefault();showGuide(\'' + c + '\')">' + c + '</a>').join('') +
    '</div></div>';
}

function goHome(e) {
  e.preventDefault();
  document.getElementById('guide-page').style.display = 'none';
  document.getElementById('home-page').style.display = 'block';
  window.scrollTo(0, 0);
}

document.querySelectorAll('.tab-nav a').forEach(tab => {
  tab.addEventListener('click', function(e) { e.preventDefault(); switchTab(this.dataset.tab); });
});
function switchTab(name) {
  document.querySelectorAll('.tab-nav a').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab-nav a[data-tab="' + name + '"]').classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  window.scrollTo({ top: document.querySelector('.tab-nav').offsetTop - 64, behavior: 'smooth' });
}

const navbar = document.getElementById('navbar');
window.addEventListener('scroll', () => { navbar.classList.toggle('scrolled', window.scrollY > 50); });
</script>
